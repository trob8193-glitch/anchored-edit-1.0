name: anchored
description: "GPS-based live territory domination game."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Map rendering (OpenStreetMap)
  flutter_map: ^7.0.2
  flutter_map_cancellable_tile_provider: ^3.0.0
  latlong2: ^0.9.1

  # GPS / location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local storage / offline cache
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/geojson/
